<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CADTML Cup 2026</title>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="shared/logo.png" alt="CADT ML Cup 2026" style="height: 70px; width: auto;">
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="matches.html">Matches</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-box card">
      <div class="section-title">Log In</div>
      <div id="msg-area"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="example@student.cadt.edu.kh">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Your password">
      </div>
      <button id="login-btn" class="btn btn-primary" style="width:100%;">Log In</button>

      <p style="margin-top: 16px; text-align: center; color: var(--gray);">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/supabase-client.js"></script>
  <script src="shared/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (getCurrentUser()) {
      window.location.href = 'matches.html';
    }

    const msgArea = document.getElementById('msg-area');
    const loginBtn = document.getElementById('login-btn');

    loginBtn.addEventListener('click', async () => {
      msgArea.innerHTML = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        msgArea.innerHTML = `<div class="error-msg">❌ Please enter your email and password.</div>`;
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      try {
        const { data, error } = await signIn(email, password);

        if (error) {
          msgArea.innerHTML = `<div class="error-msg">❌ ${error.message}</div>`;
          return;
        }

        window.location.href = 'matches.html';

      } catch (err) {
        msgArea.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
      }
    });

    // Also allow pressing Enter to submit
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
