<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CADTML Cup 2026</title>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">CADT<span>ML</span> CUP <span class="year">2026</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="matches.html">Matches</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-box card">
      <div class="section-title">Log In</div>
      <div id="msg-area"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
      </form>

      <p style="margin-top: 16px; text-align: center; color: var(--gray);">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/supabase-client.js"></script>
  <script src="shared/auth.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const msgArea = document.getElementById('msg-area');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgArea.innerHTML = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await signIn(email, password);

      if (error) {
        msgArea.innerHTML = `<div class="error-msg">${error.message}</div>`;
        return;
      }

      window.location.href = 'matches.html';
    });

    // Redirect if already logged in
    (async () => {
      const user = await getCurrentUser();
      if (user) window.location.href = 'matches.html';
    })();
  </script>
</body>
</html>
