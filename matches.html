<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches - CADTML Cup 2026</title>
  <link rel="stylesheet" href="shared/style.css">
  <style>
    /* ── Prediction Panel ── */
    .match-card {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .match-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
    }

    .match-meta-col {
      flex: 1;
      min-width: 150px;
    }

    .predict-toggle-btn {
      background: transparent;
      border: 1px solid var(--yellow, #f5c518);
      color: var(--yellow, #f5c518);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .predict-toggle-btn:hover,
    .predict-toggle-btn.open {
      background: var(--yellow, #f5c518);
      color: #111;
    }
    .predict-toggle-btn.submitted {
      border-color: #4caf80;
      color: #4caf80;
    }
    .predict-toggle-btn.submitted:hover,
    .predict-toggle-btn.submitted.open {
      background: #4caf80;
      color: #111;
    }

    .prediction-panel {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 14px;
      margin-top: 4px;
      animation: slideDown 0.18s ease;
    }
    .prediction-panel.visible {
      display: block;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .predict-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .predict-form-grid .form-group {
      margin: 0;
    }

    .predict-form-grid label {
      display: block;
      font-size: 0.72rem;
      color: var(--gray, #aaa);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .predict-form-grid input,
    .predict-form-grid select {
      width: 100%;
      padding: 7px 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-size: 0.88rem;
      box-sizing: border-box;
    }
    .predict-form-grid input:focus,
    .predict-form-grid select:focus {
      outline: none;
      border-color: var(--yellow, #f5c518);
    }
    .predict-form-grid select option {
      background: #1a1a2e;
    }

    .predict-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .predict-submit-btn {
      background: var(--yellow, #f5c518);
      color: #111;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .predict-submit-btn:hover { opacity: 0.85; }
    .predict-submit-btn:disabled { opacity: 0.5; cursor: default; }

    .predict-msg {
      font-size: 0.8rem;
      padding: 5px 10px;
      border-radius: 5px;
    }
    .predict-msg.success { color: #4caf80; background: rgba(76,175,128,0.1); }
    .predict-msg.error   { color: #f55; background: rgba(255,85,85,0.1); }

    .prediction-existing {
      font-size: 0.78rem;
      color: var(--gray, #aaa);
      font-style: italic;
    }
    .prediction-existing strong { color: #fff; font-style: normal; }

    /* Confidence % input */
    .conf-input-wrap {
      position: relative;
    }
    .conf-input-wrap input[type="number"] {
      padding-right: 28px;
    }
    .conf-pct-symbol {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray, #aaa);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .conf-badge {
      display: inline-block;
      margin-top: 5px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 20px;
      transition: background 0.2s, color 0.2s;
    }
    .conf-badge.low    { background: rgba(255,100,100,0.15); color: #f55; }
    .conf-badge.medium { background: rgba(245,197,24,0.15);  color: #f5c518; }
    .conf-badge.high   { background: rgba(76,175,128,0.15);  color: #4caf80; }
    .conf-badge.none   { background: rgba(255,255,255,0.05); color: #aaa; }

    /* Penalty field highlight */
    .pen-field {
      grid-column: 1 / -1;
      background: rgba(245,197,24,0.05);
      border: 1px solid rgba(245,197,24,0.2);
      border-radius: 8px;
      padding: 10px;
    }
    .pen-field label {
      color: var(--yellow, #f5c518) !important;
    }

    /* Login nudge */
    .predict-login-nudge {
      font-size: 0.8rem;
      color: var(--gray, #aaa);
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .predict-login-nudge a {
      color: var(--yellow, #f5c518);
      text-decoration: none;
    }

    /* Confirmation Modal */
    #confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #confirm-modal {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 380px;
      width: 90%;
      margin: auto;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="shared/logo.png" alt="CADT ML Cup 2026" style="height: 70px; width: auto;">
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="matches.html">Matches</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="admin.html" id="nav-admin" style="display:none;">Admin</a>
      <div id="nav-guest">
        <a href="login.html">Login</a>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>

      </div>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a>
    <a href="matches.html">Matches</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="admin.html" id="mobile-nav-admin" style="display:none;">Admin</a>
    <div class="mobile-actions" id="mobile-nav-guest">
      <a href="login.html" class="btn btn-outline btn-sm">Login</a>
      <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
    <div class="mobile-actions" id="mobile-nav-user" style="display:none;">
      <span class="nav-username" id="mobile-nav-username"></span>
      <a href="#" onclick="signOut()" class="btn btn-outline btn-sm">Log Out</a>
    </div>
  </div>

  <div class="container">
    <div class="section-title">Match Schedule</div>

    <div class="filter-bar" id="status-filter">
      <button class="filter-btn" data-status="all">All</button>
      <button class="filter-btn" data-status="live">🔴 Live</button>
      <button class="filter-btn active" data-status="upcoming">Upcoming</button>
      <button class="filter-btn" data-status="finished">Finished</button>
    </div>

    <div class="filter-bar" id="stage-filter">
      <button class="filter-btn" data-stage="all">All Stages</button>
      <button class="filter-btn" data-stage="group">Group Stage</button>
      <button class="filter-btn" data-stage="round32">Round of 32</button>
      <button class="filter-btn" data-stage="round16">Round of 16</button>
      <button class="filter-btn" data-stage="quarter">Quarter-Finals</button>
      <button class="filter-btn active" data-stage="semi">Semi-Finals</button>
      <button class="filter-btn" data-stage="third_place">3rd Place</button>
      <button class="filter-btn" data-stage="final">Final</button>
    </div>

    <!-- Prediction confirmation modal -->
    <div id="confirm-overlay">
      <div id="confirm-modal">
        <h3 style="margin:0 0 6px; font-size:1rem; color:#fff;">Confirm your prediction</h3>
        <p style="margin:0 0 16px; font-size:0.8rem; color:#aaa;">You can only submit once — this cannot be changed after submission.</p>
        <div id="confirm-summary" style="background:rgba(255,255,255,0.05); border-radius:8px; padding:12px 14px; margin-bottom:20px; font-size:0.85rem; line-height:1.8; color:#fff;"></div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button onclick="closeConfirm()" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:#aaa; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:0.85rem;">Cancel</button>
          <button id="confirm-yes-btn" style="background:#f5c518; color:#111; border:none; padding:8px 20px; border-radius:6px; font-weight:700; font-size:0.85rem; cursor:pointer;">Yes, submit</button>
        </div>
      </div>
    </div>

    <div id="matches-container" class="match-grid">
      <div class="loading">Loading matches...</div>
    </div>
  </div>

  <div class="footer">
    Real Data. Real Matches. Real Impact. — CADT MAKERSPACE
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/config.js"></script>
  <script src="shared/supabase-client.js"></script>
  <script src="shared/auth.js"></script>
  <script src="shared/sportsdb.js"></script>

  <script>
    let allMatches = [];
    let currentStatusFilter = 'upcoming';
    let currentStageFilter = 'semi';
    let currentUser = null;
    let myPredictions = {};
    let pendingPrediction = null;

    // Stages that can have penalties (knockout stages only)
    const PENALTY_STAGES = ['round32', 'round16', 'quarter', 'semi', 'third_place', 'final'];

    const STAGE_LABELS = {
      group: 'Group Stage',
      round32: 'Round of 32',
      round16: 'Round of 16',
      quarter: 'Quarter-Final',
      semi: 'Semi-Final',
      third_place: '3rd Place Playoff',
      final: 'Final'
    };

    async function init() {
      currentUser = getCurrentUser();
      await Promise.all([
        loadMatches(),
        currentUser ? loadMyPredictions() : Promise.resolve()
      ]);
      updateNavbar();
    }

    async function loadMatches() {
      const { data, error } = await supabaseClient
        .from('matches')
        .select('*')
        .order('match_date', { ascending: true });

      if (error) {
        document.getElementById('matches-container').innerHTML =
          `<div class="error-msg">Error loading matches: ${error.message}</div>`;
        return;
      }

      allMatches = data;
      renderMatches();
    }

    async function loadMyPredictions() {
      if (!currentUser) return;
      const { data, error } = await supabaseClient
        .from('predictions')
        .select('*')
        .eq('user_id', currentUser.id);

      if (!error && data) {
        myPredictions = {};
        data.forEach(p => { myPredictions[p.match_id] = p; });
      }
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleString(undefined, {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    const MATCH_DURATION_MS = 2 * 60 * 60 * 1000;

    function deriveStatus(m) {
      if (m.status === 'finished') return 'finished';
      if (m.status === 'live') return 'live';
      const kickoff = new Date(m.match_date).getTime();
      const now = Date.now();
      if (now >= kickoff + MATCH_DURATION_MS) return 'finished';
      if (now >= kickoff) return 'live';
      return 'upcoming';
    }

    function renderMatches() {
      const container = document.getElementById('matches-container');
      let filtered = allMatches;

      if (currentStatusFilter !== 'all') {
        filtered = filtered.filter(m => deriveStatus(m) === currentStatusFilter);
      }
      if (currentStageFilter !== 'all') {
        filtered = filtered.filter(m => m.stage === currentStageFilter);
      }

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">No matches found for this filter.</div>`;
        return;
      }

      container.innerHTML = filtered.map(m => buildMatchCard(m)).join('');
    }

    function buildMatchCard(m) {
      const displayStatus = deriveStatus(m);
      const isLive = displayStatus === 'live';
      const isFinished = displayStatus === 'finished';
      const matchStarted = isLive || isFinished;
      const isKnockout = PENALTY_STAGES.includes(m.stage);

      const isDrawResult = isFinished && m.actual_home_score != null && m.actual_away_score != null
        && m.actual_home_score === m.actual_away_score;
      const penWinnerHtml = isDrawResult && m.actual_pen_winner
        ? `<div class="pen-winner-note" style="text-align:center; font-size:0.78rem; color:#f5c518; margin-top:4px;">⚽ ${m.actual_pen_winner} won on penalties</div>`
        : '';

      let scoreDisplay = isFinished || isLive
        ? `<div class="score-box">${m.actual_home_score ?? '-'} : ${m.actual_away_score ?? '-'}</div>`
        : `<div class="vs-label">VS</div>`;
      const stageLabel = m.group_name ? `Group ${m.group_name}` : (STAGE_LABELS[m.stage] || m.stage);
      const existingPred = myPredictions[m.id];

      let predictionSection = '';

      if (!currentUser) {
        predictionSection = `
          <div class="predict-login-nudge">
            <a href="login.html">Log in</a> or <a href="signup.html">sign up</a> to submit your prediction.
          </div>
        `;
      } else if (isFinished) {
        if (existingPred) {
          const penText = existingPred.predicted_pen_winner
            ? ` · Pen winner: <strong>${existingPred.predicted_pen_winner}</strong>` : '';
          predictionSection = `
            <div class="prediction-existing">
              Your prediction: <strong>${existingPred.predicted_home_score ?? '-'} : ${existingPred.predicted_away_score ?? '-'}</strong>
              · <strong>${existingPred.predicted_outcome || '-'}</strong>
              ${penText}
              ${existingPred.confidence_pct != null ? `· Confidence: <strong>${existingPred.confidence_pct}%</strong> (${confPctToLabel(existingPred.confidence_pct)})` : ''}
              ${existingPred.points_earned != null ? `· Points: <strong style="color:#f5c518">${existingPred.points_earned}</strong>` : ''}
            </div>
          `;
        } else {
          predictionSection = `<div class="prediction-existing">Match finished — no prediction submitted.</div>`;
        }
      } else {
        const hasExisting = !!existingPred;
        const isDisabled = matchStarted;

        if (hasExisting) {
          const penText = existingPred.predicted_pen_winner
            ? ` · Pen winner: <strong>${existingPred.predicted_pen_winner}</strong>` : '';
          predictionSection = `
            <div class="prediction-existing" style="padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08);">
              🔒 Prediction locked: <strong>${existingPred.predicted_home_score} : ${existingPred.predicted_away_score}</strong>
              · <strong>${existingPred.predicted_outcome}</strong>
              ${penText}
              ${existingPred.confidence_pct != null ? `· <strong>${existingPred.confidence_pct}%</strong> (${confPctToLabel(existingPred.confidence_pct)})` : ''}
            </div>
          `;
        } else if (isDisabled) {
          predictionSection = `
            <div class="prediction-existing" style="padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08);">
              Match has started — no prediction was submitted in time.
            </div>
          `;
        } else {
          // Penalty field — only shown for knockout stages when Draw is selected
          const penFieldHtml = isKnockout ? `
            <div class="form-group pen-field" id="pen-field-${m.id}" style="display:none;">
              <label>⚽ Penalty Winner</label>
              <select id="pred-pen-${m.id}">
                <option value="">— Select penalty winner —</option>
                <option value="${m.team_home}">${m.team_home}</option>
                <option value="${m.team_away}">${m.team_away}</option>
              </select>
            </div>
          ` : '';

          predictionSection = `
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08);">
              <button class="predict-toggle-btn" id="toggle-btn-${m.id}" onclick="togglePredictPanel(${m.id})">
                🎯 Predict
              </button>
              <span class="prediction-existing">One submission only — cannot be edited afterward.</span>
            </div>

            <div class="prediction-panel" id="predict-panel-${m.id}">
              <div class="predict-form-grid">
                <div class="form-group">
                  <label>Outcome</label>
                  <select id="pred-outcome-${m.id}" onchange="togglePenaltyField(${m.id}, this.value, ${isKnockout})">
                    <option value="home">${m.team_home} Win</option>
                    <option value="draw">Draw${isKnockout ? ' (goes to penalties)' : ''}</option>
                    <option value="away">${m.team_away} Win</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>${m.team_home} Score</label>
                  <input type="number" min="0" max="20" id="pred-home-${m.id}" placeholder="0">
                </div>
                <div class="form-group">
                  <label>${m.team_away} Score</label>
                  <input type="number" min="0" max="20" id="pred-away-${m.id}" placeholder="0">
                </div>
                <div class="form-group">
                  <label>Confidence (ML %)</label>
                  <div class="conf-input-wrap">
                    <input type="number" min="0" max="100" id="pred-conf-${m.id}" placeholder="e.g. 75"
                           oninput="updateConfBadge(${m.id}, this.value)">
                    <span class="conf-pct-symbol">%</span>
                  </div>
                  <span class="conf-badge none" id="conf-badge-${m.id}">—</span>
                </div>
                ${penFieldHtml}
              </div>
              <div class="predict-actions">
                <button class="predict-submit-btn" id="pred-submit-${m.id}"
                        onclick="preparePrediction(${m.id}, '${m.team_home}', '${m.team_away}', ${isKnockout})">
                  Submit Prediction
                </button>
                <span class="predict-msg" id="pred-msg-${m.id}" style="display:none;"></span>
              </div>
            </div>
          `;
        }
      }

      return `
        <div class="match-card ${isLive ? 'live' : ''}" id="match-card-${m.id}">
          <div class="match-top">
            <div class="match-meta-col">
              <div class="match-meta">
                <span class="status-pill status-${displayStatus}">${displayStatus}</span>
                <span>${stageLabel}</span>
                <span>${formatDate(m.match_date)}</span>
                ${m.venue ? `<span>📍 ${m.venue}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="teams-row">
            <span class="team-name">${m.team_home_flag || ''} ${m.team_home}</span>
            ${scoreDisplay}
            <span class="team-name">${m.team_away} ${m.team_away_flag || ''}</span>
          </div>
          ${penWinnerHtml}
          ${predictionSection}
        </div>
      `;
    }

    function togglePredictPanel(matchId) {
      const panel = document.getElementById(`predict-panel-${matchId}`);
      const btn = document.getElementById(`toggle-btn-${matchId}`);
      const isOpen = panel.classList.contains('visible');
      panel.classList.toggle('visible', !isOpen);
      btn.classList.toggle('open', !isOpen);
    }

    // Show/hide penalty field based on outcome selection
    function togglePenaltyField(matchId, value, isKnockout) {
      if (!isKnockout) return; // Group stage — no penalties
      const penField = document.getElementById(`pen-field-${matchId}`);
      if (!penField) return;
      penField.style.display = value === 'draw' ? 'block' : 'none';
      // Reset penalty selection when hidden
      if (value !== 'draw') {
        const penSelect = document.getElementById(`pred-pen-${matchId}`);
        if (penSelect) penSelect.value = '';
      }
    }

    function preparePrediction(matchId, teamHome, teamAway, isKnockout) {
      const homeScore = document.getElementById(`pred-home-${matchId}`).value.trim();
      const awayScore = document.getElementById(`pred-away-${matchId}`).value.trim();
      const outcome = document.getElementById(`pred-outcome-${matchId}`).value;
      const confPctRaw = document.getElementById(`pred-conf-${matchId}`).value.trim();
      const msgEl = document.getElementById(`pred-msg-${matchId}`);

      if (homeScore === '' || awayScore === '') {
        showPredMsg(msgEl, 'error', 'Please enter both scores.');
        return;
      }

      // ✅ ADD THIS — parse scores into numbers first
      // const h = parseInt(homeScore);
      // const a = parseInt(awayScore);

      //     // ✅ NEW: Validate outcome matches the score logically
      // if (h === a && outcome !== 'draw') {
      //   showPredMsg(msgEl, 'error', 'Scores are equal — you must select Draw and pick a penalty winner.');
      //   return;
      // }
      // if (h > a && outcome !== 'home') {
      //   showPredMsg(msgEl, 'error', `Score favors ${teamHome} — outcome must be "${teamHome} Win".`);
      //   return;
      // }
      // if (h < a && outcome !== 'away') {
      //   showPredMsg(msgEl, 'error', `Score favors ${teamAway} — outcome must be "${teamAway} Win".`);
      //   return;
      // }

      const confPct = confPctRaw !== '' ? parseInt(confPctRaw) : null;
      if (confPct !== null && (confPct < 0 || confPct > 100)) {
        showPredMsg(msgEl, 'error', 'Confidence must be between 0 and 100.');
        return;
      }

      // Validate penalty winner if knockout + draw selected
      let penWinner = null;
      if (isKnockout && outcome === 'draw') {
        const penSelect = document.getElementById(`pred-pen-${matchId}`);
        penWinner = penSelect ? penSelect.value : '';
        if (!penWinner) {
          showPredMsg(msgEl, 'error', 'Please select a penalty winner.');
          return;
        }
      }

      pendingPrediction = {
        matchId, teamHome, teamAway,
        homeScore: parseInt(homeScore),
        awayScore: parseInt(awayScore),
        outcome, penWinner, confPct
      };

      const outcomeText = outcome === 'home' ? `${teamHome} Win`
                        : outcome === 'away' ? `${teamAway} Win`
                        : penWinner ? `Draw ${penWinner} wins on penalties`
                        : 'Draw';

      document.getElementById('confirm-summary').innerHTML = `
        <strong>${teamHome} ${homeScore} – ${awayScore} ${teamAway}</strong><br>
        Predicted Outcome: <strong>${outcomeText}</strong><br>
        ${penWinner ? `Penalty Winner: <strong>${penWinner}</strong><br>` : ''}
        ${confPct !== null ? `Confidence: <strong>${confPct}%</strong> (${confPctToLabel(confPct)})` : ''}
      `;

      document.getElementById('confirm-overlay').style.display = 'flex';
      document.getElementById('confirm-yes-btn').onclick = () => confirmSubmitPrediction();
    }

    function closeConfirm() {
      document.getElementById('confirm-overlay').style.display = 'none';
      pendingPrediction = null;
    }

    async function confirmSubmitPrediction() {
      if (!pendingPrediction) return;

      const { matchId, homeScore, awayScore, outcome, penWinner, confPct } = pendingPrediction;
      const msgEl = document.getElementById(`pred-msg-${matchId}`);
      const btn = document.getElementById(`pred-submit-${matchId}`);

      btn.disabled = true;
      btn.textContent = 'Saving…';
      closeConfirm();

      const payload = {
        user_id: currentUser.id,
        match_id: matchId,
        predicted_home_score: homeScore,
        predicted_away_score: awayScore,
        predicted_outcome: outcome,
        predicted_pen_winner: penWinner || null,
        confidence: confPct != null ? confPctToLabel(confPct).toLowerCase() : null,
        confidence_pct: confPct,
        source: 'web'
      };

      const { error } = await supabaseClient
        .from('predictions')
        .insert(payload);

      btn.disabled = false;
      btn.textContent = 'Submit Prediction';

      if (error) {
        if (error.code === '23505') {
          showPredMsg(msgEl, 'error', 'You already submitted a prediction for this match.');
        } else {
          showPredMsg(msgEl, 'error', error.message);
        }
        return;
      }

      myPredictions[matchId] = payload;

      const m = allMatches.find(x => x.id === matchId);
      const cardEl = document.getElementById(`match-card-${matchId}`);
      if (cardEl && m) cardEl.outerHTML = buildMatchCard(m);

      showPredMsg(msgEl, 'success', 'Prediction submitted successfully!');
    }

    function confPctToLabel(pct) {
      if (pct == null) return '—';
      const n = parseInt(pct);
      if (n < 40) return 'Low';
      if (n < 70) return 'Medium';
      return 'High';
    }

    function updateConfBadge(matchId, val) {
      const badge = document.getElementById(`conf-badge-${matchId}`);
      if (!badge) return;
      if (!val) {
        badge.className = 'conf-badge none';
        badge.textContent = '—';
        return;
      }
      const n = parseInt(val);
      if (isNaN(n)) return;
      const label = confPctToLabel(n);
      badge.className = `conf-badge ${label.toLowerCase()}`;
      badge.textContent = label;
    }

    function showPredMsg(el, type, text) {
      el.className = `predict-msg ${type}`;
      el.textContent = text;
      el.style.display = 'inline-block';
      if (type === 'success') {
        setTimeout(() => { el.style.display = 'none'; }, 3000);
      }
    }

    // Filter buttons
    document.querySelectorAll('#status-filter .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#status-filter .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatusFilter = btn.dataset.status;
        renderMatches();
      });
    });

    document.querySelectorAll('#stage-filter .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#stage-filter .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStageFilter = btn.dataset.stage;
        renderMatches();
      });
    });

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('open');
    });

    init();
    setInterval(async () => {
      await loadMatches();
      if (currentUser) await loadMyPredictions();
    }, 30000);
  </script>
</body>
</html>
