<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CADTML Cup 2026</title>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="shared/logo.png" alt="CADT ML Cup 2026" style="height: 70px; width: auto;">
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="matches.html">Matches</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-box card">
      <div class="section-title">Sign Up</div>
      <div id="msg-area"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="team_name">Team Name <span style="color:red;">*</span></label>
          <input type="text" id="team_name" required placeholder="e.g. Dragon Predictors">
        </div>
        
        <div class="form-group">
          <label for="email">Email <span style="color:red;">*</span></label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        
        <div class="form-group">
          <label for="password">Password <span style="color:red;">*</span></label>
          <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
      </form>

      <p style="margin-top: 16px; text-align: center; color: var(--gray);">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/auth.js"></script>
<script>
  const form = document.getElementById('signup-form');
  const msgArea = document.getElementById('msg-area');
  const submitBtn = form.querySelector('button[type="submit"]');

  form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msgArea.innerHTML = '';

  const teamName = document.getElementById('team_name')?.value.trim() || '';
  const email = document.getElementById('email')?.value.trim() || '';
  const password = document.getElementById('password')?.value || '';

  if (!teamName) {
    msgArea.innerHTML = `<div class="error-msg">❌ Team Name is required!</div>`;
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account...';

  try {
    const { data, error } = await signUp(email, password, teamName);

    if (error) {
      msgArea.innerHTML = `<div class="error-msg">❌ ${error.message}</div>`;
      return;
    }

    msgArea.innerHTML = `<div class="success-msg">✅ Account created! Please check your email.</div>`;
    form.reset();

  } catch (err) {
    msgArea.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';
  }
});
</script>
</body>
</html>
